# Build + publish the LlmOnLan installers to GitHub Releases on a vX.Y.Z tag.
# Each matrix job builds the bundled OWUI sidecar for ITS OS, then runs
# electron-builder --publish always. See docs/INTEGRATION_BRIEF.md §6.

name: release

on:
  push:
    tags: ['v*']

# Required so electron-builder can create the release (403s otherwise, even on a
# public repo).
permissions:
  contents: write

jobs:
  # Pre-create the GitHub release so electron-builder only ever UPLOADS to it and
  # never races to create it. electron-builder uploads a release's assets in
  # parallel, and each upload that finds no release triggers its own "create
  # release" — those raced (even within one job) and 422'd with already_exists,
  # dropping assets (the macOS loss in v0.1.2, the Windows latest.yml loss in
  # v0.1.3). With the release pre-made, every job/upload takes the upload-only path.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
                 --notes "Automated release $GITHUB_REF_NAME." --verify-tag

  build:
    needs: create-release
    strategy:
      fail-fast: false
      # Belt-and-suspenders with the pre-created release: serialize so asset
      # uploads never overlap across OSes either.
      max-parallel: 1
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Build the self-contained Open WebUI sidecar for this OS (the heavy step:
      # downloads a standalone CPython + pip-installs the pinned open-webui). It is
      # NO LONGER bundled into the installer — it's published as a separate release
      # asset the app downloads on first run (keeps the installer ~100 MB).
      - name: Build OWUI sidecar
        run: node sidecar/build-sidecar.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pack the sidecar as owui-sidecar-<platform>-<arch>.tar.gz + a tiny manifest
      # (the OWUI version) for the app's download-on-first-run + OWUI-update flow.
      - name: Package the OWUI sidecar
        shell: bash
        run: |
          set -e
          plat=$(node -e "process.stdout.write(process.platform+'-'+process.arch)")
          ver=$(tr -d ' \r\n' < sidecar/OPENWEBUI_VERSION)
          tar -czf "owui-sidecar-${plat}.tar.gz" -C sidecar/build/sidecar .
          printf '{"owuiVersion":"%s"}\n' "$ver" > owui-sidecar-manifest.json
          ls -la owui-sidecar-* | cat

      - name: Install shell deps
        working-directory: shell
        run: npm ci

      # Compile TypeScript → shell/build/ BEFORE packaging. electron-builder is
      # invoked directly (not via the `dist` npm script, which chains the build),
      # so without this the app.asar ships without build/main/index.js and the
      # packager fails its entry-file sanity check.
      - name: Compile shell (tsc)
        working-directory: shell
        run: npm run build

      # Build the installers ONLY — do NOT let electron-builder publish. Its GitHub
      # publisher races to create the release across its own parallel uploads (it
      # ignores a pre-made published release and makes its own draft), producing
      # DUPLICATE releases with assets split between them. `--publish never` still
      # generates the latest*.yml auto-update manifests + blockmaps in dist/.
      - name: Build installers
        working-directory: shell
        run: npx --no-install electron-builder --publish never
        env:
          # Don't let a stray keychain cert hijack the macOS ad-hoc signing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Upload with `gh` (no create-race) to the release create-release already made.
      # --clobber overwrites on a re-run; nullglob skips patterns this OS didn't build.
      # Uploads the small installer + the sidecar tar.gz + the manifest.
      - name: Upload to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          files=(shell/dist/*.exe shell/dist/*.dmg shell/dist/*.zip shell/dist/*.AppImage shell/dist/*.blockmap shell/dist/latest*.yml owui-sidecar-*.tar.gz owui-sidecar-manifest.json)
          echo "Uploading ${#files[@]} file(s): ${files[*]}"
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

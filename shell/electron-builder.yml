# electron-builder — packages the shell ONLY into a small (~100 MB) self-updating
# installer per OS, published to GitHub Releases (no paid signing). The Open WebUI
# sidecar is NOT bundled — the app downloads it to userData on first run (see
# src/main/sidecarManager.ts). The CI publishes the sidecar as a separate
# `owui-sidecar-<platform>-<arch>.tar.gz` release asset.

appId: com.llmonlan.client
productName: LlmOnLan

# App sources (node_modules production deps — incl. electron-updater — are
# included automatically; dev deps are pruned). No extraResources: the heavy OWUI
# sidecar is fetched at runtime, keeping the installer small.
files:
  - build/**/*
  - renderer/**/*
  - assets/**/*
  - package.json

directories:
  output: dist
  buildResources: assets

# macOS only: ad-hoc codesign so Gatekeeper doesn't flag the app as "damaged".
afterPack: scripts/afterPack.cjs

# Self-update from GitHub Releases. releaseType:release so CI publishes a real
# (non-draft, non-prerelease) release — the only kind electron-updater sees.
publish:
  provider: github
  owner: b2renger
  repo: LlmOnLan
  releaseType: release

win:
  target: nsis
  icon: assets/icon.png

# NSIS per-user (perMachine:false) → electron-updater installs updates silently,
# no UAC prompt. oneClick for a frictionless install. artifactName has NO spaces
# (electron-builder's default "<name> Setup <ver>.exe" → GitHub turns the spaces
# into dots on upload, which breaks electron-updater's filename match in latest.yml).
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: ${productName}-Setup-${version}.${ext}

mac:
  category: public.app-category.productivity
  icon: assets/icon.png
  # dmg (download) + zip (REQUIRED for latest-mac.yml / Squirrel.Mac auto-update).
  # arm64 ONLY: the bundled sidecar is built for the CI runner's arch (macos-latest
  # is arm64), so an x64 dmg would ship an arm64 Python and break on Intel Macs.
  # Re-add x64 once build-sidecar can produce both arch bundles.
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  # Ad-hoc signing (no Apple cert): builder skips signing, afterPack does it.
  # hardenedRuntime:false — ad-hoc + hardened rejects the pre-signed Electron fw.
  identity: null
  hardenedRuntime: false

linux:
  target: AppImage
  icon: assets/icon.png
  category: Network

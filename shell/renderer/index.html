<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>LlmOnLan</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- topbar: logo · connection status · theme toggle · settings gear -->
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="../assets/icon.svg" alt="LlmOnLan" />
      <div>
        <div class="title">LlmOnLan <span class="title-sub">· powered by Open WebUI</span></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="status" id="status" title="Connection">
        <span class="dot idle" id="status-dot"></span>
        <span id="status-text">Starting…</span>
      </button>
      <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Preferences" aria-label="Preferences">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- connection popover (farms found on the LAN + add-by-address fallback) -->
  <div class="popover hidden" id="conn-popover">
    <div class="pop-head">
      <span class="pop-title">Servers on your network</span>
      <span class="pop-scan" id="pop-scan"></span>
    </div>
    <div class="farm-list" id="farm-list"></div>
    <div class="pop-empty hidden" id="farm-empty">
      No servers found yet. Make sure a farm is running (<code>lol up</code>) on the network, or add
      one by address below.
    </div>
    <form class="add-form" id="add-form">
      <input id="add-host" type="text" placeholder="Add by address — e.g. 10.10.16.5" spellcheck="false" />
      <button class="btn-primary-sm" type="submit">Add</button>
    </form>
    <div class="pop-foot">
      <label class="scan-toggle"><input type="checkbox" id="auto-scan" /> Auto-search the subnet</label>
      <button class="btn-ghost" id="rescan-btn" type="button">Rescan</button>
    </div>
  </div>

  <!-- main: connection overlay over the embedded Open WebUI webview -->
  <div class="main">
    <div class="overlay" id="overlay">
      <div class="panel" id="panel">
        <div class="big-dot" id="panel-icon"><div class="spinner" id="spinner"></div></div>
        <h1 id="panel-title">Starting your local chat…</h1>
        <p id="panel-msg">Open WebUI is starting on your machine.</p>
        <p class="detail" id="panel-detail"></p>
        <div id="panel-actions"></div>
      </div>
    </div>
    <webview id="owui" class="hidden" partition="persist:owui" allowpopups></webview>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
